name: tomo_align

channels:
  - conda-forge

dependencies:
  # ------------------------------------------------------------------
  # Python
  # ------------------------------------------------------------------
  - python=3.10

  # ------------------------------------------------------------------
  # Core scientific stack
  # ------------------------------------------------------------------
  - numpy>=1.24,<3.0
  - scipy>=1.10
  - matplotlib>=3.7
  - scikit-image>=0.21
  - h5py>=3.9
  - imageio
  - imageio-ffmpeg
  - pillow
  - tqdm
  - pyyaml
  - psutil

  # ------------------------------------------------------------------
  # FFT / performance
  # ------------------------------------------------------------------
  - pyfftw

  # ------------------------------------------------------------------
  # Video export
  # ------------------------------------------------------------------
  - ffmpeg

  # ------------------------------------------------------------------
  # Tomography reconstruction
  # ------------------------------------------------------------------
  - astra-toolbox>=2.2

  # ------------------------------------------------------------------
  # Optional visualization
  # ------------------------------------------------------------------
  - pyvista
  - vtk

  # ------------------------------------------------------------------
  # Packaging / pip
  # ------------------------------------------------------------------
  - pip

  - pip:
      # safer OpenCV headless
      - opencv-python-headless>=4.8

      # optional GPU acceleration
      # install manually if CUDA exists
      # pip install cupy-cuda11x